# ==========================================
# Application
# ==========================================
spring.application.name=ExpenseTracker
server.port=8080

# ==========================================
# MySQL Database Configuration
# ==========================================
# Change these values to match your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/expensetracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=your_mysql_password

# ==========================================
# H2 Fallback (comment out MySQL above and uncomment below to use H2)
# ==========================================
# spring.datasource.url=jdbc:h2:mem:expensedb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# Thymeleaf
# ==========================================
spring.thymeleaf.cache=false

# ==========================================
# Session
# ==========================================
server.servlet.session.timeout=30m
