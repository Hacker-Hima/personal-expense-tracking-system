<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Register – ExpenseTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:440px;box-shadow:0 25px 60px rgba(0,0,0,.15)}
.logo{text-align:center;margin-bottom:30px}
.logo h1{font-size:1.8rem;font-weight:700;color:#2d3748}
.logo p{color:#718096;font-size:.9rem;margin-top:4px}
.logo-icon{width:60px;height:60px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:15px;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-size:28px}
.alert{padding:12px 16px;border-radius:10px;margin-bottom:20px;font-size:.875rem}
.alert-danger{background:#fff5f5;color:#c53030;border:1px solid #feb2b2}
.form-group{margin-bottom:18px}
label{display:block;font-size:.875rem;font-weight:500;color:#4a5568;margin-bottom:6px}
input{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:.95rem;font-family:inherit;transition:border-color .2s;outline:none}
input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.15)}
.field-error{color:#e53e3e;font-size:.8rem;margin-top:4px}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.92}
.footer-link{text-align:center;margin-top:20px;font-size:.875rem;color:#718096}
.footer-link a{color:#667eea;font-weight:500;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">💰</div>
    <h1>Create Account</h1>
    <p>Join ExpenseTracker today</p>
  </div>
  <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>
  <form th:action="@{/register}" th:object="${user}" method="post">
    <div class="form-group">
      <label>Username</label>
      <input type="text" th:field="*{username}" placeholder="Choose a username"/>
      <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" th:field="*{password}" placeholder="Choose a strong password"/>
      <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
    </div>
    <button type="submit" class="btn">Create Account</button>
  </form>
  <div class="footer-link">Already have an account? <a th:href="@{/login}">Sign in</a></div>
</div>
</body>
</html>
